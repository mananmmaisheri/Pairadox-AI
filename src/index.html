<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pairadox AI Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --grid-color: rgba(56, 189, 248, 0.2);
      }

      body {
        background-color: #000;
        font-family: 'Orbitron', sans-serif;
        overflow: hidden;
      }

      /* Moving Grid Floor */
      .bg-grid {
        background-size: 40px 40px;
        background-image:
          linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
          linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
        transform: perspective(500px) rotateX(60deg);
        transform-origin: center top;
        animation: grid-move 20s linear infinite;
      }

      @keyframes grid-move {
        0% { background-position: 0 0; }
        100% { background-position: 0 400px; }
      }

      /* Scanlines Overlay */
      .bg-scanlines {
        background: linear-gradient(
          to bottom,
          rgba(255,255,255,0),
          rgba(255,255,255,0) 50%,
          rgba(0,0,0,0.2) 50%,
          rgba(0,0,0,0.2)
        );
        background-size: 100% 4px;
        pointer-events: none;
      }

      /* Animations */
      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes spin-reverse {
        from { transform: rotate(360deg); }
        to { transform: rotate(0deg); }
      }
      @keyframes pulse-ring {
        0% { transform: scale(0.8); opacity: 0; }
        50% { opacity: 0.5; }
        100% { transform: scale(1.3); opacity: 0; }
      }
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes slide-down {
        from { opacity: 0; transform: translate(-50%, -20px); }
        to { opacity: 1; transform: translate(-50%, 0); }
      }
      @keyframes scan-line {
        0% { top: 0%; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }
      
      /* Intro Door Animations (Previously Missing) */
      @keyframes slide-left {
        from { transform: translateX(0); }
        to { transform: translateX(-100%); }
      }
      @keyframes slide-right {
        from { transform: translateX(0); }
        to { transform: translateX(100%); }
      }
      @keyframes crt-flicker {
        0% { opacity: 0.9; }
        5% { opacity: 0.8; }
        10% { opacity: 0.9; }
        15% { opacity: 1; }
        50% { opacity: 0.9; }
        80% { opacity: 1; }
        90% { opacity: 0.8; }
        100% { opacity: 0.9; }
      }

      .animate-spin-slow { animation: spin-slow 10s linear infinite; }
      .animate-spin-reverse { animation: spin-reverse 15s linear infinite; }
      .animate-pulse-fast { animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      .animate-fade-in { animation: fade-in 0.5s ease-out forwards; }
      .animate-slide-down { animation: slide-down 0.4s ease-out forwards; }
      .animate-scan { animation: scan-line 2s linear infinite; }
      .animate-slide-left { animation: slide-left 1.2s cubic-bezier(0.7, 0, 0.3, 1) forwards; }
      .animate-slide-right { animation: slide-right 1.2s cubic-bezier(0.7, 0, 0.3, 1) forwards; }
      .animate-flicker { animation: crt-flicker 0.1s infinite; }
      
      /* Glitch Effect */
      .glitch-text {
        position: relative;
      }
      .glitch-text::before,
      .glitch-text::after {
        content: attr(data-text);
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      .glitch-text::before {
        left: 2px;
        text-shadow: -1px 0 #ff00c1;
        clip: rect(44px, 450px, 56px, 0);
        animation: glitch-anim 5s infinite linear alternate-reverse;
      }
      .glitch-text::after {
        left: -2px;
        text-shadow: -1px 0 #00fff9;
        clip: rect(44px, 450px, 56px, 0);
        animation: glitch-anim2 5s infinite linear alternate-reverse;
      }
      
      @keyframes glitch-anim {
        0% { clip: rect(38px, 9999px, 86px, 0); }
        5% { clip: rect(81px, 9999px, 24px, 0); }
        10% { clip: rect(5px, 9999px, 94px, 0); }
        15% { clip: rect(21px, 9999px, 14px, 0); }
        20% { clip: rect(78px, 9999px, 4px, 0); }
        25% { clip: rect(50px, 9999px, 34px, 0); }
        30% { clip: rect(10px, 9999px, 5px, 0); }
        35% { clip: rect(54px, 9999px, 60px, 0); }
        40% { clip: rect(18px, 9999px, 50px, 0); }
        45% { clip: rect(8px, 9999px, 83px, 0); }
        50% { clip: rect(40px, 9999px, 16px, 0); }
        55% { clip: rect(23px, 9999px, 73px, 0); }
        60% { clip: rect(62px, 9999px, 61px, 0); }
        65% { clip: rect(34px, 9999px, 15px, 0); }
        70% { clip: rect(86px, 9999px, 23px, 0); }
        75% { clip: rect(12px, 9999px, 45px, 0); }
        80% { clip: rect(57px, 9999px, 11px, 0); }
        85% { clip: rect(32px, 9999px, 93px, 0); }
        90% { clip: rect(71px, 9999px, 28px, 0); }
        95% { clip: rect(15px, 9999px, 69px, 0); }
        100% { clip: rect(51px, 9999px, 42px, 0); }
      }
      @keyframes glitch-anim2 {
        0% { clip: rect(11px, 9999px, 34px, 0); }
        5% { clip: rect(85px, 9999px, 52px, 0); }
        10% { clip: rect(31px, 9999px, 17px, 0); }
        15% { clip: rect(65px, 9999px, 82px, 0); }
        20% { clip: rect(14px, 9999px, 59px, 0); }
        25% { clip: rect(93px, 9999px, 19px, 0); }
        30% { clip: rect(45px, 9999px, 74px, 0); }
        35% { clip: rect(28px, 9999px, 39px, 0); }
        40% { clip: rect(72px, 9999px, 12px, 0); }
        45% { clip: rect(56px, 9999px, 91px, 0); }
        50% { clip: rect(22px, 9999px, 48px, 0); }
        55% { clip: rect(76px, 9999px, 15px, 0); }
        60% { clip: rect(38px, 9999px, 67px, 0); }
        65% { clip: rect(89px, 9999px, 24px, 0); }
        70% { clip: rect(13px, 9999px, 53px, 0); }
        75% { clip: rect(61px, 9999px, 86px, 0); }
        80% { clip: rect(35px, 9999px, 21px, 0); }
        85% { clip: rect(94px, 9999px, 58px, 0); }
        90% { clip: rect(49px, 9999px, 32px, 0); }
        95% { clip: rect(17px, 9999px, 75px, 0); }
        100% { clip: rect(66px, 9999px, 43px, 0); }
      }

      /* FUI Utilities */
      .fui-bracket {
        position: relative;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .fui-bracket::before, .fui-bracket::after {
        content: '';
        position: absolute;
        width: 8px;
        height: 8px;
        border-color: currentColor;
        border-style: solid;
        transition: all 0.3s ease;
      }
      .fui-bracket::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
      .fui-bracket::after { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

      .font-mono { font-family: 'Fira Code', monospace; }

      /* Scrollbar */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
</head>
  <body class="text-white antialiased selection:bg-cyan-500 selection:text-black">
    <div id="root"></div>
  </body>
</html>
